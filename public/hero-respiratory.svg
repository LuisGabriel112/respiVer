<svg viewBox="0 0 480 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0D2E55"/>
      <stop offset="100%" stop-color="#071525"/>
    </radialGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7DF9FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="520" rx="24" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.06">
    <line x1="0" y1="50" x2="480" y2="50" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="480" y2="100" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="480" y2="150" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="480" y2="200" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="480" y2="250" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="480" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="480" y2="350" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="480" y2="400" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="450" x2="480" y2="450" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="50" y1="0" x2="50" y2="520" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="520" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="520" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="520" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="520" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="520" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="520" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="520" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="430" y1="0" x2="430" y2="520" stroke="#00E5FF" stroke-width="0.5"/>
  </g>

  <!-- Glow backdrop for lungs -->
  <ellipse cx="240" cy="270" rx="140" ry="160" fill="#00E5FF" opacity="0.04"/>

  <!-- LEFT LUNG -->
  <path
    d="M200 155 C198 155 180 162 165 178 C148 196 138 218 135 242 C130 270 132 296 138 318 C144 340 158 362 178 370 C192 376 205 372 215 362 C224 352 226 336 223 316 L218 230 C216 208 210 178 200 155Z"
    stroke="url(#accentGrad)"
    stroke-width="2.5"
    stroke-linejoin="round"
    fill="rgba(0, 229, 255, 0.06)"
    filter="url(#glow)"
  />

  <!-- RIGHT LUNG -->
  <path
    d="M280 155 C282 155 300 162 315 178 C332 196 342 218 345 242 C350 270 348 296 342 318 C336 340 322 362 302 370 C288 376 275 372 265 362 C256 352 254 336 257 316 L262 230 C264 208 270 178 280 155Z"
    stroke="url(#accentGrad)"
    stroke-width="2.5"
    stroke-linejoin="round"
    fill="rgba(0, 229, 255, 0.06)"
    filter="url(#glow)"
  />

  <!-- Trachea vertical -->
  <line x1="240" y1="72" x2="240" y2="155" stroke="url(#accentGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Trachea cartilage rings -->
  <line x1="233" y1="85" x2="247" y2="85" stroke="#7DF9FF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="233" y1="97" x2="247" y2="97" stroke="#7DF9FF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="233" y1="109" x2="247" y2="109" stroke="#7DF9FF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="233" y1="121" x2="247" y2="121" stroke="#7DF9FF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="233" y1="133" x2="247" y2="133" stroke="#7DF9FF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="233" y1="145" x2="247" y2="145" stroke="#7DF9FF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- Carina / bifurcation -->
  <path d="M240 155 L200 155 M240 155 L280 155" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Left bronchi branches -->
  <path d="M200 155 C194 172 190 192 192 214" stroke="#7DF9FF" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M192 195 C184 202 178 215 176 230" stroke="#7DF9FF" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M192 214 C198 225 200 240 197 256" stroke="#7DF9FF" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M176 230 C170 242 168 258 170 272" stroke="#7DF9FF" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M197 256 C204 268 206 282 203 296" stroke="#7DF9FF" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Right bronchi branches -->
  <path d="M280 155 C286 172 290 192 288 214" stroke="#7DF9FF" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M288 195 C296 202 302 215 304 230" stroke="#7DF9FF" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M288 214 C282 225 280 240 283 256" stroke="#7DF9FF" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M304 230 C310 242 312 258 310 272" stroke="#7DF9FF" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M283 256 C276 268 274 282 277 296" stroke="#7DF9FF" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Scan indicator lines -->
  <line x1="100" y1="240" x2="380" y2="240" stroke="#205295" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="100" y1="290" x2="380" y2="290" stroke="#205295" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Data point: left lung -->
  <circle cx="160" cy="290" r="6" fill="#00E5FF" opacity="0.7" filter="url(#glow)"/>
  <circle cx="160" cy="290" r="14" stroke="#00E5FF" stroke-width="1.2" opacity="0.25"/>
  <circle cx="160" cy="290" r="22" stroke="#00E5FF" stroke-width="0.6" opacity="0.12"/>

  <!-- Data point: right lung -->
  <circle cx="320" cy="290" r="6" fill="#00E5FF" opacity="0.7" filter="url(#glow)"/>
  <circle cx="320" cy="290" r="14" stroke="#00E5FF" stroke-width="1.2" opacity="0.25"/>
  <circle cx="320" cy="290" r="22" stroke="#00E5FF" stroke-width="0.6" opacity="0.12"/>

  <!-- Measurement label left -->
  <rect x="102" y="272" width="38" height="14" rx="3" fill="#112D5A" opacity="0.85"/>
  <text x="121" y="282" font-family="monospace" font-size="8" fill="#00E5FF" text-anchor="middle" opacity="0.9">FVC</text>

  <!-- Measurement label right -->
  <rect x="340" y="272" width="38" height="14" rx="3" fill="#112D5A" opacity="0.85"/>
  <text x="359" y="282" font-family="monospace" font-size="8" fill="#00E5FF" text-anchor="middle" opacity="0.9">FEV1</text>

  <!-- Breathing waveform -->
  <path
    d="M54 432 L86 432 L98 408 L112 458 L128 390 L144 468 L158 420 L172 436 L184 432 L208 432 L222 412 L238 452 L254 394 L270 462 L284 430 L296 432 L320 432 L334 415 L348 449 L362 408 L376 440 L388 432 L420 432"
    stroke="#00E5FF"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.75"
    filter="url(#glow)"
  />
  <!-- Waveform baseline -->
  <line x1="44" y1="432" x2="436" y2="432" stroke="#205295" stroke-width="0.8" opacity="0.35"/>

  <!-- SpO2 value display -->
  <rect x="24" y="396" width="72" height="52" rx="8" fill="#0D1F3A" stroke="#205295" stroke-width="1" opacity="0.95"/>
  <text x="60" y="416" font-family="monospace" font-size="8" fill="#7DF9FF" text-anchor="middle" opacity="0.7">SpO₂</text>
  <text x="60" y="436" font-family="monospace" font-size="16" fill="#00E5FF" text-anchor="middle" font-weight="bold">98%</text>

  <!-- FEV1/FVC display -->
  <rect x="384" y="396" width="72" height="52" rx="8" fill="#0D1F3A" stroke="#205295" stroke-width="1" opacity="0.95"/>
  <text x="420" y="416" font-family="monospace" font-size="7" fill="#7DF9FF" text-anchor="middle" opacity="0.7">FEV1/FVC</text>
  <text x="420" y="436" font-family="monospace" font-size="16" fill="#00E5FF" text-anchor="middle" font-weight="bold">82%</text>

  <!-- Corner tech brackets -->
  <path d="M24 24 L24 48 L48 48" stroke="#205295" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M456 24 L456 48 L432 48" stroke="#205295" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M24 496 L24 472 L48 472" stroke="#205295" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M456 496 L456 472 L432 472" stroke="#205295" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Corner dots -->
  <circle cx="24" cy="24" r="3" fill="#205295" opacity="0.6"/>
  <circle cx="456" cy="24" r="3" fill="#205295" opacity="0.6"/>
  <circle cx="24" cy="496" r="3" fill="#205295" opacity="0.6"/>
  <circle cx="456" cy="496" r="3" fill="#205295" opacity="0.6"/>

  <!-- Top status bar -->
  <rect x="0" y="0" width="480" height="48" rx="24" fill="#071525" opacity="0.6"/>
  <circle cx="38" cy="24" r="5" fill="#00E5FF" opacity="0.8"/>
  <text x="52" y="29" font-family="monospace" font-size="10" fill="#7DF9FF" opacity="0.8">RESPIVER · Unidad Respiratoria</text>
  <rect x="400" y="14" width="56" height="20" rx="4" fill="#112D5A" stroke="#205295" stroke-width="0.8"/>
  <text x="428" y="28" font-family="monospace" font-size="9" fill="#00E5FF" text-anchor="middle" opacity="0.9">ACTIVO</text>
</svg>
